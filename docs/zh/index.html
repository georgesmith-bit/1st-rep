<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>2048</title>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S0NZ96NCB1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S0NZ96NCB1');
    </script>
</head>
<body>
    <div id="app">
        <header>
            <h1>2048</h1>
            <div class="header-right">
                <div class="score-box" role="status" aria-live="polite" aria-label="当前分数">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box" role="status" aria-live="polite" aria-label="最高分">
                    <div class="score-label">最高</div>
                    <div class="score-value" id="best">0</div>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="切换深色模式">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        <div class="game-intro">
            <span>滑动合并，挑战高分！</span>
            <div class="buttons">
                <button id="undo-btn" aria-label="撤销上一步">撤销</button>
                <button id="restart-btn" aria-label="开始新游戏">新游戏</button>
            </div>
        </div>
        <div class="game-hint">方向键 / WASD 或滑动屏幕</div>
        <div id="board-container" role="application" aria-label="2048 游戏棋盘">
            <div id="board" aria-label="游戏网格"></div>
            <div id="game-over" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">游戏结束！</div>
                    <button id="retry-btn" aria-label="重新开始">重新开始</button>
                </div>
            </div>
            <div id="win-message" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">你赢了！</div>
                    <div class="win-buttons">
                        <button id="keep-playing-btn" aria-label="继续游戏">继续游戏</button>
                        <button id="new-game-btn" aria-label="开始新游戏">新游戏</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/main.js?v=7"></script>
</body>
</html>
