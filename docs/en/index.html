<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>2048</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>2048</h1>
            <div class="header-right">
                <div class="score-box" role="status" aria-live="polite" aria-label="Current score">
                    <div class="score-label">SCORE</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box" role="status" aria-live="polite" aria-label="Best score">
                    <div class="score-label">BEST</div>
                    <div class="score-value" id="best">0</div>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        <div class="game-intro">
            <span>Join the tiles, get to 2048!</span>
            <div class="buttons">
                <button id="undo-btn" aria-label="Undo last move">Undo</button>
                <button id="restart-btn" aria-label="Start new game">New Game</button>
            </div>
        </div>
        <div class="game-hint">Arrow keys / WASD or swipe to play</div>
        <div id="board-container" role="application" aria-label="2048 game board">
            <div id="board" aria-label="Game grid"></div>
            <div id="game-over" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">Game Over!</div>
                    <button id="retry-btn" aria-label="Try again">Try Again</button>
                </div>
            </div>
            <div id="win-message" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">You Win!</div>
                    <div class="win-buttons">
                        <button id="keep-playing-btn" aria-label="Keep playing">Keep Playing</button>
                        <button id="new-game-btn" aria-label="Start new game">New Game</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/main.js?v=7"></script>
</body>
</html>
