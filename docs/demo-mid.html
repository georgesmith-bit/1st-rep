<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#faf8ef;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:10px}
.container{width:100%;max-width:400px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.title{font-size:32px;font-weight:bold;color:#776e65}
.scores{display:flex;gap:6px}
.score-box{background:#bbada0;color:white;border-radius:4px;padding:4px 12px;text-align:center;min-width:70px}
.score-label{font-size:10px;text-transform:uppercase;opacity:0.8}
.score-value{font-size:18px;font-weight:bold}
.hint{text-align:center;color:#776e65;font-size:13px;margin-bottom:8px}
.controls{display:flex;gap:8px;margin-bottom:8px}
.btn{flex:1;padding:8px;border:none;border-radius:4px;background:#8f7a66;color:white;font-size:14px;font-weight:bold;cursor:pointer;text-align:center}
.btn-undo{background:#a08060}
.board{position:relative;width:100%;aspect-ratio:1;background:#bbada0;border-radius:8px;padding:8px}
.bg-cell{position:absolute;background:rgba(238,228,218,0.35);border-radius:4px}
.tile{position:absolute;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:bold;transition:transform 100ms}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:white}
.tile-32{background:#f67c5f;color:white}
.tile-64{background:#f65e3b;color:white}
.tile-128{background:#edcf72;color:white;font-size:20px;box-shadow:0 0 30px 10px rgba(243,215,116,0.25)}
.tile-256{background:#edcc61;color:white;font-size:20px;box-shadow:0 0 30px 10px rgba(243,210,99,0.35)}
.tile-512{background:#edc850;color:white;font-size:20px;box-shadow:0 0 30px 10px rgba(243,200,85,0.45)}
.tile-1024{background:#edc53f;color:white;font-size:16px;box-shadow:0 0 30px 10px rgba(243,197,63,0.55)}
.tile-2048{background:#edc22e;color:white;font-size:16px;box-shadow:0 0 30px 10px rgba(243,194,46,0.65)}
@media (prefers-color-scheme:dark) {
  body{background:#1a1a2e}
  .title,.hint,.score-label{color:#eee}
  .board{background:#2a2a4a}
  .bg-cell{background:rgba(255,255,255,0.05)}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="title">2048</div>
  <div class="scores">
    <div class="score-box"><div class="score-label">Score</div><div class="score-value">12.4k</div></div>
    <div class="score-box"><div class="score-label">Best</div><div class="score-value">176.5k</div></div>
  </div>
</div>
<p class="hint">Swipe to merge tiles → 2048!</p>
<div class="controls">
  <div class="btn btn-undo">↩ Undo</div>
  <div class="btn">New Game</div>
</div>
<div class="board" id="board"></div>
</div>
<script>
const board = document.getElementById('board');
const w = board.clientWidth;
const padding = 8;
const gap = 8;
const cellSize = (w - padding*2 - gap*3) / 4;

// Draw background cells
for(let r=0;r<4;r++) for(let c=0;c<4;c++){
  const cell = document.createElement('div');
  cell.className = 'bg-cell';
  cell.style.width = cellSize+'px';
  cell.style.height = cellSize+'px';
  cell.style.left = (padding + c*(cellSize+gap))+'px';
  cell.style.top = (padding + r*(cellSize+gap))+'px';
  board.appendChild(cell);
}

// Mid-game state: busy board with mixed tiles
const tiles = [
  [128,32,8,2],
  [4,64,16,4],
  [256,1024,32,8],
  [2,512,128,16]
];

for(let r=0;r<4;r++) for(let c=0;c<4;c++){
  if(!tiles[r][c]) continue;
  const val = tiles[r][c];
  const tile = document.createElement('div');
  tile.className = 'tile tile-'+val;
  tile.textContent = val;
  const fs = val >= 1024 ? '18px' : val >= 128 ? '22px' : '28px';
  tile.style.fontSize = fs;
  tile.style.width = cellSize+'px';
  tile.style.height = cellSize+'px';
  tile.style.lineHeight = cellSize+'px';
  tile.style.left = (padding + c*(cellSize+gap))+'px';
  tile.style.top = (padding + r*(cellSize+gap))+'px';
  board.appendChild(tile);
}
</script>
</body>
</html>
