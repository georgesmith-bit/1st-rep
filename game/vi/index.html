<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>2048</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>2048</h1>
            <div class="header-right">
                <div class="score-box" role="status" aria-live="polite" aria-label="Điểm hiện tại">
                    <div class="score-label">ĐIỂM</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box" role="status" aria-live="polite" aria-label="Điểm cao nhất">
                    <div class="score-label">CAO NHẤT</div>
                    <div class="score-value" id="best">0</div>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Chuyển đổi chế độ tối">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        <div class="game-intro">
            <span>Trượt và gộp để đạt 2048!</span>
            <div class="buttons">
                <button id="undo-btn" aria-label="Hoàn tác bước trước">Hoàn tác</button>
                <button id="restart-btn" aria-label="Bắt đầu trò chơi mới">Mới</button>
            </div>
        </div>
        <div class="game-hint">Phím mũi tên / WASD hoặc vuốt để chơi</div>
        <div id="board-container" role="application" aria-label="Bàn chơi 2048">
            <div id="board" aria-label="Lưới trò chơi"></div>
            <div id="game-over" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">Kết thúc!</div>
                    <button id="retry-btn" aria-label="Thử lại">Thử lại</button>
                </div>
            </div>
            <div id="win-message" class="hidden" role="alert" aria-live="assertive">
                <div class="overlay">
                    <div class="message">Bạn thắng!</div>
                    <div class="win-buttons">
                        <button id="keep-playing-btn" aria-label="Tiếp tục chơi">Chơi tiếp</button>
                        <button id="new-game-btn" aria-label="Bắt đầu trò chơi mới">Mới</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/main.js?v=7"></script>
</body>
</html>
